<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=2.0">
    <title>Bocadito</title>
    <link rel="icon" href="pictures/logo.ico">
</head>

<body>

    <hr>
    <h1>Bienvenido a Bocadito</h1>

    <h4>Productos pensados en la salud de sus consumidores Modificados en Azúcar y Grasa 🍞🥧</h4>
    <hr>
    <h1>Descripcion</h1>
    <p>Un negocio de emprendimiento entre hermanas con un gusto peculiar por la comida</p>
    <hr>
    <h1>Menu</h1>
    <h3>Menu de Lunes a Martes </h3>
    <img src="pictures/menu.jpg" width="300" height="550">
    <hr>
    <h2>Registro</h2>
    <form>
        <label for="nombre">Nombre</label>
        <input id="nombre" placeholder="Ingrese su nombre" /> <br> <br>

        <label for="apellido">Apellido</label>
        <input id="apellido" placeholder="Ingrese su apellido"> <br> <br>

        <label for="Departamentos">Departamentos</label>
        <select>
            <option value="">Seleccione el departamento</option>
            <option value="Granada">Granada</option>
            <option value="Managua">Managua</option>
            <option value="Leon">Leon</option>
            <option value="Chinandega">Chinandega</option>
        </select>

        <label for="Direccion">Direccion</label>
        <input id="Direccion" placeholder="Ingrese su direccion" /> <br> <br>

        <label for="numero">Numero de Telefono</label>
        <input id="numero" placeholder="Ingrese su numero movil"> <br> <br>

        <label for="pago">Metodo de pago</label>
        <select name="pago" id="pago">
            <option value=""></option>
            <option value="Tarjeta">Tarjeta</option>
            <option value="Efectivo">Efectivo</option>
        </select>
    </form>
    
    <hr>
    <h2>Contactenos</h2>
    <a target="_blank" href="https://instagram.com/dame_un_bocadito?igshid=MmU2YjMzNjRlOQ==">dame_un_bocadito</a> <br>
    <hr>

</body>

</html>
